<style>
  :root {
    --bg: #f6f7fb;
    --card: #ffffff;
    --primary: #4f46e5;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #38bdf8;
    --purple: #6366f1;

    --text: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;

    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 12px;

    --shadow-sm: 0 6px 18px rgba(0,0,0,.06);
    --shadow-md: 0 12px 30px rgba(0,0,0,.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px 36px;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 22px 26px;
    box-shadow: var(--shadow-md);
  }

  .brand {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .logo {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: var(--primary);
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: 18px;
  }

  .title {
    font-weight: 800;
    font-size: 18px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
  }

  .statusPill {
    background: #eef2ff;
    color: var(--primary);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 22px;
    margin-top: 26px;
  }

  @media (max-width: 980px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    padding: 22px;
  }

  .wide {
    grid-column: 1 / -1;
  }

  .cardHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .cardTitle {
    font-weight: 800;
    font-size: 16px;
  }

  .cardSub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .badge {
    background: #f3f4f6;
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
  }

  /* DROPZONE */
  .drop {
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dropInner {
    text-align: center;
    max-width: 360px;
  }

  .dropIcon {
    font-size: 36px;
    color: var(--primary);
    margin-bottom: 12px;
  }

  .dropTitle {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .dropHint {
    font-size: 13px;
    color: var(--muted);
  }

  .row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 18px;
  }

  /* BUTTONS */
  .btn {
    padding: 10px 18px;
    border-radius: var(--radius-md);
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    background: #f3f4f6;
    color: var(--text);
  }

  .btn:hover {
    background: #e5e7eb;
  }

  .btn.primary {
    background: var(--primary);
    color: #fff;
  }

  .btn.primary:disabled {
    opacity: .5;
    cursor: not-allowed;
  }

  .btn.ghost {
    background: transparent;
    color: var(--muted);
  }

  /* FORM */
  .label {
    font-size: 13px;
    color: var(--muted);
    margin: 14px 0 6px;
    display: block;
  }

  .input {
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--line);
    font-size: 14px;
  }

  .row2 {
    display: flex;
    gap: 16px;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  .row3 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 10px;
  }

  .check {
    font-size: 13px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .divider {
    height: 1px;
    background: var(--line);
    margin: 18px 0;
  }

  .micro {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }

  /* TABLE */
  .tableWrap {
    overflow-x: auto;
    margin-top: 10px;
  }

  .table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .table th {
    text-align: left;
    padding: 10px;
    color: var(--muted);
    font-weight: 700;
    border-bottom: 1px solid var(--line);
  }

  .table td {
    padding: 10px;
    border-bottom: 1px solid var(--line);
  }

  /* PROGRESS */
  .progressBar {
    height: 8px;
    border-radius: 999px;
    background: #e5e7eb;
    overflow: hidden;
    margin-top: 14px;
  }

  .progressFill {
    height: 100%;
    background: var(--primary);
    width: 0%;
  }

  .progressMeta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* FOOTER */
  .footer {
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
